<!DOCTYPE html>
<html>
<head>
    <title>Document Intelligence Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<h1 class="text-3xl font-bold mb-6 text-center">📚 Book Dashboard</h1>

<div class="grid grid-cols-2 gap-6">

    <!-- LEFT: BOOK LIST -->
    <div class="bg-white p-4 rounded shadow">
        <h2 class="text-xl font-semibold mb-3">Books</h2>

        <button onclick="loadBooks()" class="bg-blue-500 text-white px-4 py-2 rounded mb-3">
            Load Books
        </button>

        <ul id="bookList" class="space-y-2"></ul>
    </div>

    <!-- RIGHT: ADD BOOK -->
    <div class="bg-white p-4 rounded shadow">
        <h2 class="text-xl font-semibold mb-3">Add Book</h2>

        <input id="title" placeholder="Title" class="border p-2 w-full mb-2">
        <input id="author" placeholder="Author" class="border p-2 w-full mb-2">
        <input id="description" placeholder="Description" class="border p-2 w-full mb-2">

        <button onclick="addBook()" class="bg-green-500 text-white px-4 py-2 rounded">
            Add Book
        </button>
    </div>

</div>

<!-- Q&A SECTION -->
<div class="bg-white p-4 rounded shadow mt-6">
    <h2 class="text-xl font-semibold mb-3">Ask Question 🤖</h2>

    <input id="question" placeholder="Ask something..." class="border p-2 w-full mb-2">

    <button onclick="askQuestion()" class="bg-purple-500 text-white px-4 py-2 rounded">
        Ask
    </button>

    <p id="answer" class="mt-3 font-semibold text-green-600"></p>
</div>

<script>

const API = "http://127.0.0.1:8000/api";


// =======================
// 📚 LOAD BOOKS (SAFE)
// =======================
function loadBooks() {
    fetch(API + "/books/")
    .then(async res => {
        const data = await res.json().catch(() => null);

        if (!res.ok) {
            throw new Error("Failed to load books");
        }

        return data;
    })
    .then(data => {
        let list = document.getElementById("bookList");
        list.innerHTML = "";

        data.forEach(book => {
            let li = document.createElement("li");
            li.className = "p-2 border rounded bg-gray-50";

            li.innerHTML = `
                <b>${book.title}</b> by ${book.author}<br>
                <small class="text-gray-600">${book.genre}</small>
            `;

            list.appendChild(li);
        });
    })
    .catch(err => {
        alert(err.message);
    });
}


// =======================
// ➕ ADD BOOK (SAFE)
// =======================
function addBook() {

    let title = document.getElementById("title").value || "";
    let author = document.getElementById("author").value || "";
    let description = document.getElementById("description").value || "";

    fetch(API + "/books/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ title, author, description })
    })
    .then(async res => {
        const data = await res.json().catch(() => null);

        if (!res.ok) {
            throw new Error(data?.error || "Failed to add book");
        }

        return data;
    })
    .then(data => {
        alert("Book Added ✅");

        // clear inputs
        document.getElementById("title").value = "";
        document.getElementById("author").value = "";
        document.getElementById("description").value = "";

        loadBooks();
    })
    .catch(err => {
        alert(err.message);
    });
}


// =======================
// 🤖 ASK QUESTION (FIXED)
// =======================
function askQuestion() {

    let q = document.getElementById("question").value || "";

    fetch(API + "/ask/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ question: q })
    })
    .then(async res => {
        const data = await res.json().catch(() => null);

        if (!res.ok) {
            throw new Error(data?.error || "Server Error");
        }

        return data;
    })
    .then(data => {
        document.getElementById("answer").innerText = data.answer;
    })
    .catch(err => {
        document.getElementById("answer").innerText = "Error: " + err.message;
    });
}

</script>

</body>
</html>
